<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twister | Perfil</title>
    <link rel="stylesheet" href="/twister.css">
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <div class="brand-mark">TW</div>
            <div>
                <p class="eyebrow">Mini social app</p>
                <h1>Perfil</h1>
            </div>
        </div>
        <nav class="main-nav" aria-label="Navegación principal">
            <span class="user-chip hidden" id="headerSessionUser">@-</span>
            <a id="homeNavLink" href="/feed">Inicio</a>
            <a class="active" href="/profile">Mi perfil</a>
            <button class="button button-ghost nav-logout hidden" id="headerLogoutButton" type="button">Cerrar sesión</button>
        </nav>
    </header>

    <main class="shell two-column">
        <section class="card profile-card">
            <div class="section-head compact">
                <div>
                    <p class="eyebrow">Datos de usuario</p>
                    <h3 id="profileTitle">Perfil</h3>
                </div>
                <span class="avatar" id="profileAvatar">U</span>
            </div>
            <div class="profile-info">
                <p class="profile-name" id="profileName">-</p>
                <p class="profile-handle" id="profileHandle">@-</p>
                <p class="profile-bio" id="profileBio">-</p>
            </div>
            <div class="stats-grid">
                <div>
                    <span class="stat-label">Joined</span>
                    <strong id="profileJoined">-</strong>
                </div>
                <div>
                    <span class="stat-label">Posts</span>
                    <strong id="profilePostsCount">0</strong>
                </div>
                <div>
                    <span class="stat-label">Modo</span>
                    <strong id="profileMode">Lectura</strong>
                </div>
            </div>
            <p class="feedback" id="profileFeedback"></p>
        </section>

        <section class="card" id="editCard">
            <div class="section-head compact">
                <div>
                    <p class="eyebrow">Edición</p>
                    <h3>Editar mi perfil</h3>
                </div>
            </div>
            <form id="editForm" class="form-grid">
                <label>
                    Nombre para mostrar
                    <input id="editDisplayName" maxlength="40" placeholder="Nombre para mostrar">
                </label>
                <label>
                    Bio
                    <textarea id="editBio" rows="4" maxlength="240" placeholder="Tu bio"></textarea>
                </label>
                <label>
                    Color de avatar
                    <input id="editAvatarColor" value="#1f7aec" placeholder="#1f7aec">
                </label>
                <button class="button button-primary" type="submit">Guardar cambios</button>
                <p class="feedback" id="editFeedback"></p>
            </form>
        </section>

        <section class="card" id="postsCard">
            <div class="section-head compact">
                <div>
                    <p class="eyebrow">Publicaciones</p>
                    <h3>Posts del usuario</h3>
                </div>
            </div>
            <div id="userPostsList" class="feed-list compact-feed"></div>
        </section>
    </main>

    <template id="postTemplate">
        <article class="post-card">
            <div class="post-header">
                <div class="post-author">
                    <span class="avatar small-avatar"></span>
                    <div>
                        <a class="post-name post-author-link" href="/profile/"></a>
                        <p class="post-handle"></p>
                    </div>
                </div>
                <time class="post-time" datetime="2000-01-01T00:00:00Z">2000-01-01T00:00:00Z</time>
            </div>
            <p class="post-content"></p>
            <div class="post-footer">
                <span class="post-likes"></span>
            </div>
        </article>
    </template>

    <script src="/profilePage.js"></script>
</body>
</html>
